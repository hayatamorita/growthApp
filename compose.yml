services:
  app:
    build: ./app
    ports:
      - "5002:5000"
    volumes:
      - ./app:/app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://growth_user:growth_password@db:5432/growth_db}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-local-dev-secret-key}
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-growth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-growth_password}
      POSTGRES_DB: ${POSTGRES_DB:-growth_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
