{% extends "base.html" %}

{% block title %}Add - 成長記録アプリ{% endblock %}

{% block content %}
  <div class="top-bar">
    <h1 class="page-title">きろくを追加</h1>
    <button class="success" form="record-form" type="submit">✓</button>
  </div>

  <form id="record-form" class="stack" method="post" enctype="multipart/form-data">
    <label class="photo-upload" for="image">
      <span style="font-size: 34px;">📷</span>
      <span>お写真をえらぶ</span>
      <input id="image" name="image" type="file" accept="image/png,image/jpeg,image/gif,image/webp">
    </label>

    <div class="input-card">
      <label for="record_date">日付</label>
      <input id="record_date" name="record_date" type="date" value="{{ form.get('record_date', '') }}" required>
    </div>

    <div class="measure-grid">
      <div class="measure-card">
        <label for="height_cm">身長</label>
        <div class="unit-row">
          <input id="height_cm" name="height_cm" type="number" step="0.1" min="0" placeholder="74.2" value="{{ form.get('height_cm', '') }}">
          <span class="unit">cm</span>
        </div>
      </div>
      <div class="measure-card blue">
        <label for="weight_kg">体重</label>
        <div class="unit-row">
          <input id="weight_kg" name="weight_kg" type="number" step="0.1" min="0" placeholder="9.1" value="{{ form.get('weight_kg', '') }}">
          <span class="unit">kg</span>
        </div>
      </div>
    </div>

    <div class="input-card">
      <label for="memo">Diary</label>
      <textarea id="memo" name="memo" placeholder="今日はどんなことがあった？">{{ form.get('memo', '') }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit">保存する</button>
      <a class="button secondary" href="{{ url_for('child_detail', child_id=child.id) }}">戻る</a>
    </div>
  </form>
{% endblock %}
