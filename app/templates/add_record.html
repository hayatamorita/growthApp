{% extends "base.html" %}

{% block title %}記録を追加 - 成長記録アプリ{% endblock %}

{% block content %}
  <section class="card">
    <h2>{{ child.name }} の記録を追加</h2>
    <form method="post">
      <label for="record_date">記録日（必須）</label>
      <input id="record_date" name="record_date" type="date" value="{{ form.get('record_date', '') }}" required>

      <label for="height_cm">身長（cm）</label>
      <input id="height_cm" name="height_cm" type="number" step="0.1" min="0" value="{{ form.get('height_cm', '') }}">

      <label for="weight_kg">体重（kg）</label>
      <input id="weight_kg" name="weight_kg" type="number" step="0.1" min="0" value="{{ form.get('weight_kg', '') }}">

      <label for="memo">メモ</label>
      <textarea id="memo" name="memo">{{ form.get('memo', '') }}</textarea>

      <button type="submit">保存する</button>
      <a class="button" href="{{ url_for('child_detail', child_id=child.id) }}">戻る</a>
    </form>
  </section>
{% endblock %}
