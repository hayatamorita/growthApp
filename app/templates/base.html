<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}成長記録アプリ{% endblock %}</title>
  <style>
    body {
      margin: 0;
      background: #f0f9f3;
      color: #173523;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }
    header {
      background: #2f9e44;
      color: white;
      padding: 20px;
    }
    header a {
      color: white;
      text-decoration: none;
    }
    main {
      max-width: 960px;
      margin: 28px auto;
      padding: 0 16px;
    }
    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(31, 111, 60, 0.12);
      margin-bottom: 20px;
      padding: 22px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-top: 12px;
    }
    input, textarea {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #b7dfc4;
      border-radius: 10px;
      font: inherit;
      margin-top: 6px;
      padding: 10px 12px;
    }
    textarea {
      min-height: 110px;
    }
    button, .button {
      display: inline-block;
      border: 0;
      border-radius: 10px;
      background: #2f9e44;
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      margin-top: 14px;
      padding: 10px 16px;
      text-decoration: none;
    }
    button.danger {
      background: #e5484d;
    }
    .muted {
      color: #5f7f69;
    }
    .flash {
      border-radius: 10px;
      margin-bottom: 16px;
      padding: 12px 14px;
    }
    .flash.success {
      background: #e8f8ef;
      color: #1f6f3c;
    }
    .flash.error {
      background: #ffecec;
      color: #a62125;
    }
    .list {
      list-style: none;
      padding: 0;
    }
    .list li {
      border-top: 1px solid #dff2e4;
      padding: 14px 0;
    }
    .row {
      align-items: center;
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }
    .inline-form {
      display: inline;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ url_for('index') }}">成長記録アプリ</a></h1>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
